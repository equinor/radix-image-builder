name: Build and deploy Docker
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # semver stable
      - 'v[0-9]+.[0-9]+.[0-9]+-*' # semver with prerelease suffix
permissions: {}
jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release-exist: ${{ steps.metadata.outputs.release_exist }}
      is-stable-release: ${{ steps.metadata.outputs.is_stable_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Metadata
        id: metadata
        env:
          tag: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          version=${tag#v}
          release_exist="true"

          if ! gh release view v${version} 1> /dev/null ; then
            release_exist="false"
          fi

          is_stable_release="false"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]$ ]]; then
              is_stable_release="true"
          fi

          echo "version="$version"" >>"$GITHUB_OUTPUT"
          echo "release_exist="$release_exist"" >>"$GITHUB_OUTPUT"
          echo "is_stable_release="$is_stable_release"" >>"$GITHUB_OUTPUT"
          
  deploy-docker:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    env:
      CONTAINER_REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Container metadata
        id: container-metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: "${{ env.CONTAINER_REGISTRY }}/equinor/radix/image-builder"
          tags: |
            type=raw,value=${{ needs.metadata.outputs.version }}
            type=raw,value=latest,enable=${{ needs.metadata.outputs.is-stable-release }}
      - name: Build and push container images
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: ${{ steps.container-metadata.outputs.tags }}
          labels: ${{ steps.container-metadata.outputs.labels }}
